    <style>
      /* Global Loading Screen Styles to prevent FOUC */
      body, html { margin: 0; padding: 0; }
      .loading-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        background-color: #ffffff;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(138, 99, 210, 0.1);
        border-left-color: #8a63d2;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-text {
        font-size: 1rem;
        color: #888;
        letter-spacing: 3px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
