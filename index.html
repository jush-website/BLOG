<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>我的作品集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      /* Global Loading Screen Styles to prevent FOUC.
         Inlined and theme-aware so the first paint already matches App.css. */
      :root { color-scheme: light dark; --boot-paper: #f4f2ef; --boot-ink: #9a9e9f; --boot-accent: #b4472c; }
      @media (prefers-color-scheme: dark) {
        :root { --boot-paper: #17191a; --boot-ink: #6f7476; --boot-accent: #d06a4a; }
      }
      /* Background goes on body ONLY, never html. The app paints its user background
         image in a z-index:-1 layer; that layer sits above the canvas but below any
         real box background. If html carries a background it owns the canvas, body
         then paints its own opaque box, and the user's background image vanishes. */
      body, html { margin: 0; padding: 0; }
      body { background-color: var(--boot-paper); }
      .loading-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100dvh;
        width: 100vw;
        background-color: var(--boot-paper);
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid transparent;
        border-left-color: var(--boot-accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-text {
        font-family: system-ui, sans-serif;
        font-size: 0.8rem;
        color: var(--boot-ink);
        letter-spacing: 0.25em;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .spinner { animation-duration: 2s; }
        .loading-text { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
